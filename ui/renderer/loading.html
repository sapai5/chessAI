<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Downloading Assets</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        :root {
            --bg-color: #1a1a24;
            --border-color: #2D2D3F;
            --text-color: #FFFFFF;
            --text-muted: #8E8EA8;
            --accent-blue: #9DE0FF;
            --accent-pink: #FFC3D1;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            border: 3.5px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            -webkit-app-region: drag; /* Make borderless window draggable */
            user-select: none;
        }

        .title {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            color: var(--accent-pink);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            text-align: center;
            font-weight: 600;
            line-height: 1.4;
        }

        .progress-container {
            width: 100%;
            height: 24px;
            background-color: #0e0e15;
            border: 2.5px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 2px 2px 0px var(--border-color);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent-blue);
            transition: width 0.1s linear;
        }

        .status {
            margin-top: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--accent-blue);
        }

        .loader-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader-icon">⚙️</div>
    <div class="title">Downloading Assets</div>
    <div class="subtitle">Fetching Chess AI vision models from GitHub Releases...</div>
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="status" id="status-text">0%</div>

    <script>
        const { ipcRenderer } = require('electron');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');

        ipcRenderer.on('download-progress', (event, percent) => {
            progressBar.style.width = percent + '%';
            statusText.innerText = percent + '%';
        });

        ipcRenderer.on('download-error', (event, errorMsg) => {
            document.querySelector('.title').innerText = "Download Error";
            document.querySelector('.title').style.color = "#FF8080";
            document.querySelector('.subtitle').innerText = "Error: " + errorMsg;
            statusText.innerText = "Check your connection and try again.";
            statusText.style.color = "#FF8080";
        });
    </script>
</body>
</html>
